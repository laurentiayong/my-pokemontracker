<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pokémon Card 151 · SV2a Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0e13;--surf:#12151f;--card:#191d29;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e4e1d8;--muted:#565c72;--faint:#252a3a;
  --red:#ff4b69;--yellow:#ffd84d;--blue:#4dbfff;
  --green:#3deba0;--purple:#b87cff;
  --font:'Outfit',sans-serif;--mono:'Space Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 40% at 10% 0%,rgba(77,191,255,0.05) 0%,transparent 60%),
             radial-gradient(ellipse 50% 50% at 90% 100%,rgba(184,124,255,0.06) 0%,transparent 60%)}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,0.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.012) 1px,transparent 1px);
  background-size:48px 48px}

/* HEADER */
header{position:sticky;top:0;z-index:50;background:rgba(12,14,19,0.9);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);padding:1rem 2rem;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:0.65rem;flex-shrink:0}
.pokeball{width:32px;height:32px;border-radius:50%;
  background:conic-gradient(var(--red) 0deg 180deg,#ccc8be 180deg 360deg);
  display:flex;align-items:center;justify-content:center;border:2px solid var(--border2);position:relative;flex-shrink:0}
.pokeball::before{content:'';position:absolute;left:0;right:0;top:50%;height:2px;background:var(--border2);transform:translateY(-50%)}
.pokeball::after{content:'';width:8px;height:8px;border-radius:50%;background:var(--bg);border:2px solid var(--border2);position:absolute}
.logo-text{font-size:1rem;font-weight:800;letter-spacing:-0.02em}
.logo-text span{color:var(--red)}
.logo-sub{font-family:var(--mono);font-size:0.52rem;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;display:block;margin-top:1px}
.header-controls{display:flex;align-items:center;gap:0.65rem;flex-wrap:wrap}
.search-wrap{position:relative}
.search-wrap input{background:var(--card);border:1px solid var(--border);border-radius:7px;
  padding:0.45rem 0.75rem 0.45rem 2rem;color:var(--text);font-family:var(--font);font-size:0.82rem;
  width:190px;outline:none;transition:border-color 0.2s}
.search-wrap input:focus{border-color:var(--border2)}
.search-wrap input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:0.6rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;pointer-events:none}
.pill-row{display:flex;gap:3px;flex-wrap:wrap}
.pill{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.08em;text-transform:uppercase;
  border:1px solid var(--border);border-radius:20px;padding:4px 9px;
  background:none;color:var(--muted);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.pill.on{background:var(--faint);border-color:var(--border2);color:var(--text)}
.pill:hover:not(.on){border-color:var(--border2);color:var(--text)}
.show-btn{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.08em;text-transform:uppercase;
  border:1px solid var(--border);border-radius:20px;padding:4px 10px;
  background:none;cursor:pointer;white-space:nowrap;transition:all 0.15s}
.show-btn.s-all{color:var(--muted)}
.show-btn.s-owned{color:var(--green);border-color:rgba(61,235,160,0.3);background:rgba(61,235,160,0.06)}
.show-btn.s-missing{color:var(--red);border-color:rgba(255,75,105,0.3);background:rgba(255,75,105,0.06)}
.vt-row{display:flex;gap:3px}
.vbtn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--muted);cursor:pointer;padding:4px 7px;font-size:13px;transition:all 0.15s}
.vbtn.on{color:var(--text);background:var(--faint);border-color:var(--border2)}
.reset-btn{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.08em;text-transform:uppercase;
  background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;padding:4px 9px;transition:all 0.15s}
.reset-btn:hover{color:var(--red);border-color:rgba(255,75,105,0.4)}

/* PROGRESS */
.progress-strip{position:relative;z-index:5;background:var(--surf);border-bottom:1px solid var(--border);
  padding:0.85rem 2rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
.pstats{display:flex;gap:1.5rem;flex-wrap:wrap}
.ps{font-family:var(--mono);font-size:0.6rem;letter-spacing:0.08em;color:var(--muted)}
.ps b{color:var(--text);font-weight:700}
.ps.g b{color:var(--green)}
.ps.r b{color:var(--red)}
.ptk{flex:1;min-width:160px;height:5px;background:var(--faint);border-radius:3px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--green),#7af5c8);border-radius:3px;transition:width 0.4s ease}
.ppct{font-family:var(--mono);font-size:0.68rem;font-weight:700;color:var(--green);min-width:36px;text-align:right}

/* SECTION */
.sec-div{position:relative;z-index:5;padding:1.1rem 2rem 0.5rem;display:flex;align-items:center;gap:1rem}
.sec-div h2{font-family:var(--mono);font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.sdivl{flex:1;height:1px;background:var(--border)}
.sec-count{font-family:var(--mono);font-size:0.56rem;color:var(--muted);background:var(--faint);border:1px solid var(--border);border-radius:10px;padding:2px 7px;white-space:nowrap}

/* MAIN */
.main{position:relative;z-index:5;padding:0 2rem 3rem}

/* GRID */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:9px}
.cgrid.wide{grid-template-columns:repeat(auto-fill,minmax(155px,1fr))}

/* TILE */
.ctile{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;
  border:2px solid transparent;transition:transform 0.18s,border-color 0.18s,box-shadow 0.18s;
  background:var(--card);user-select:none}
.ctile:hover{transform:translateY(-4px)}
.ctile.owned{border-color:rgba(61,235,160,0.45);box-shadow:0 0 12px rgba(61,235,160,0.15)}
.ctile.missing{border-color:rgba(255,255,255,0.05)}
.ctile.missing .cimg img{filter:grayscale(100%) brightness(0.42)}

.cimg{aspect-ratio:2.5/3.5;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--faint)}
.cimg img{width:100%;height:100%;object-fit:cover;display:none;transition:transform 0.25s}
.ctile:hover .cimg img{transform:scale(1.06)}
.sph{position:absolute;inset:0;background:linear-gradient(90deg,var(--faint) 25%,#2e3345 50%,var(--faint) 75%);background-size:600px 100%;animation:shimmer 1.4s infinite}
.sph.done{display:none}
.phi{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;opacity:0.28}
.phi .mb{width:26px;height:26px;border-radius:50%;background:conic-gradient(var(--red) 0deg 180deg,#555 180deg 360deg);position:relative;display:flex;align-items:center;justify-content:center}
.phi .mb::after{content:'';width:7px;height:7px;border-radius:50%;background:var(--faint);position:absolute}
.phi span{font-family:var(--mono);font-size:0.48rem;color:var(--muted)}

.ochk{position:absolute;top:5px;right:5px;z-index:3;width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:10px;transition:all 0.2s}
.ctile.owned .ochk{background:var(--green);color:#0a1a14;font-weight:700}
.ctile.missing .ochk{background:rgba(255,255,255,0.07);color:transparent;border:1px solid var(--border)}

.hover-hint{position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;transition:opacity 0.18s}
.ctile:hover .hover-hint{opacity:1}
.ctile.owned .hover-hint span{background:rgba(61,235,160,0.12);border:1px solid rgba(61,235,160,0.3);color:var(--green)}
.ctile.missing .hover-hint span{background:rgba(255,75,105,0.1);border:1px solid rgba(255,75,105,0.25);color:var(--red)}
.hover-hint span{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.08em;text-transform:uppercase;padding:4px 9px;border-radius:5px;backdrop-filter:blur(6px)}

.cinfo{padding:5px 7px 7px;background:var(--card)}
.cnum{font-family:var(--mono);font-size:0.5rem;color:var(--muted);margin-bottom:1px}
.cname{font-size:0.73rem;font-weight:600;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cr{display:inline-block;margin-top:3px;font-family:var(--mono);font-size:0.46rem;letter-spacing:0.1em;text-transform:uppercase;font-weight:700;padding:1px 6px;border-radius:10px}
.r-C  {background:rgba(86,92,114,0.18);color:#8b90a8;border:1px solid rgba(255,255,255,0.07)}
.r-R  {background:rgba(77,191,255,0.12);color:var(--blue);border:1px solid rgba(77,191,255,0.22)}
.r-RR {background:rgba(255,78,106,0.12);color:var(--red);border:1px solid rgba(255,78,106,0.22)}
.r-AR {background:rgba(77,191,255,0.12);color:var(--blue);border:1px solid rgba(77,191,255,0.22)}
.r-SR {background:rgba(255,216,77,0.12);color:var(--yellow);border:1px solid rgba(255,216,77,0.22)}
.r-SAR{background:rgba(184,124,255,0.15);color:var(--purple);border:1px solid rgba(184,124,255,0.28)}
.r-UR {background:rgba(61,235,160,0.12);color:var(--green);border:1px solid rgba(61,235,160,0.25)}

/* LIST VIEW */
.clist{}
.lrow{display:flex;align-items:center;gap:10px;padding:7px 8px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;border-radius:6px;margin:0 -8px}
.lrow:hover{background:rgba(255,255,255,0.025)}
.lthumb{width:34px;height:47px;border-radius:4px;overflow:hidden;flex-shrink:0;background:var(--faint);position:relative}
.lthumb img{width:100%;height:100%;object-fit:cover;display:none}
.lrow.missing .lthumb img{filter:grayscale(100%) brightness(0.45)}
.linfo{flex:1;min-width:0}
.lname{font-size:0.85rem;font-weight:600}
.lmeta{display:flex;align-items:center;gap:5px;margin-top:2px}
.lnum{font-family:var(--mono);font-size:0.58rem;color:var(--muted)}
.lstatus{margin-left:auto;display:flex;align-items:center;gap:5px;flex-shrink:0}
.sdot{width:7px;height:7px;border-radius:50%}
.sdot.o{background:var(--green)}
.sdot.m{background:var(--faint);border:1px solid var(--muted)}
.slabel{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.06em;text-transform:uppercase}
.lrow.owned .slabel{color:var(--green)}
.lrow.missing .slabel{color:var(--muted)}

.empty{text-align:center;padding:3.5rem 1rem;font-family:var(--mono);font-size:0.7rem;color:var(--muted)}
.empty span{display:block;font-size:2rem;margin-bottom:0.75rem;opacity:0.25}

@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
@keyframes checkPop{0%{transform:scale(0.5)}60%{transform:scale(1.35)}100%{transform:scale(1)}}
.cp{animation:checkPop 0.22s ease forwards}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="pokeball"></div>
    <div>
      <div class="logo-text">Pokémon Card <span>151</span></div>
      <span class="logo-sub">SV2a · Japanese · Complete Checklist</span>
    </div>
  </div>
  <div class="header-controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="search" placeholder="Search cards…" oninput="applyFilters()"/>
    </div>
    <div class="pill-row" id="rpills">
      <button class="pill on" data-r="ALL" onclick="setRarity(this)">All</button>
      <button class="pill" data-r="C"   onclick="setRarity(this)">C</button>
      <button class="pill" data-r="R"   onclick="setRarity(this)">R</button>
      <button class="pill" data-r="RR"  onclick="setRarity(this)">RR</button>
      <button class="pill" data-r="AR"  onclick="setRarity(this)">AR</button>
      <button class="pill" data-r="SR"  onclick="setRarity(this)">SR</button>
      <button class="pill" data-r="SAR" onclick="setRarity(this)">SAR</button>
      <button class="pill" data-r="UR"  onclick="setRarity(this)">UR</button>
    </div>
    <button class="show-btn s-all" id="showbtn" onclick="cycleShow()">Show: All</button>
    <div class="vt-row">
      <button class="vbtn on" id="vg" onclick="setView('grid')" title="Grid">⊞</button>
      <button class="vbtn"    id="vl" onclick="setView('list')" title="List">≡</button>
    </div>
    <button class="reset-btn" onclick="confirmReset()">Reset</button>
  </div>
</header>

<div class="progress-strip">
  <div class="pstats">
    <span class="ps g">Owned <b id="po">0</b></span>
    <span class="ps r">Missing <b id="pm">165</b></span>
    <span class="ps">Total <b id="pt">165</b></span>
  </div>
  <div class="ptk"><div class="pf" id="pf" style="width:0%"></div></div>
  <span class="ppct" id="ppct">0%</span>
</div>

<div id="out" class="main"></div>

/* ─────────────────────────────────────────────
   CORRECTED SV2a CARD LIST
   Source: pokellector.com + pokeguardian.com
   Total: 165 base + 45 secret = 210 cards

   Key corrections vs previous version:
   • Many base Pokémon are actually "ex" (e.g. Venusaur ex at #3, Charizard ex at #6)
   • #94 is Gengar ex (not plain Gengar)
   • Trainer cards 152-165 are the correct Kanto gym leader trainers
   • AR section: Bulbasaur, Ivysaur, Charmander, Charmeleon, Squirtle, Wartortle,
     Caterpie, Pikachu, Nidoking, Psyduck, Poliwrath, Machamp, Haunter, Starmie,
     Scyther, Jynx, Magmar, Snorlax, Dragonite, Mew (AR 166-185)
   • SAR section: Venusaur ex, Charizard ex, Blastoise ex, Arbok ex, Ninetales ex,
     Wigglytuff ex, Vileplume ex, Golem ex, Alakazam ex, Kangaskhan ex, Jynx ex,
     Gyarados, Lapras ex, Eevee ex, Snorlax ex, Zapdos ex, Dragonite ex, Mewtwo ex,
     Mew ex (SAR 186-207)
   • SR section: Erika's Invitation, Giovanni's Charisma, Misty's Request,
     Bill's Transfer (trainer SRs 208-210... actually 4 SRs exist)
   • UR: only confirmed UR is energy/special
─────────────────────────────────────────────── */

const TOTAL = CARDS.length;

const SECTIONS = [
  {label:"Base Pokémon  001–151", from:1,   to:151},
  {label:"Trainer cards 152–165", from:152, to:165},
  {label:"Art Rare (AR) 166–185", from:166, to:185},
  {label:"Special Art Rare (SAR) 186–207", from:186, to:207},
  {label:"Special Rare (SR) 208–210",      from:208, to:210},
  {label:"Ultra Rare (UR) 211",            from:211, to:211},
];

let owned = new Set();
let activeRarity = "ALL";
let showMode = "all";
let curView = "grid";

function save(){try{localStorage.setItem("sv2a_v4",JSON.stringify([...owned]));}catch(e){}}
function load(){try{const d=localStorage.getItem("sv2a_v4");if(d)owned=new Set(JSON.parse(d));}catch(e){}}

function toggle(n){
  if(owned.has(n)){owned.delete(n);}else{owned.add(n);}
  save(); updateProgress();
  const el=document.getElementById("c"+n);
  if(!el)return;
  const isO=owned.has(n);
  el.classList.toggle("owned",isO);
  el.classList.toggle("missing",!isO);
  const chk=el.querySelector(".ochk");
  if(chk){chk.textContent=isO?"✓":"";chk.classList.add("cp");setTimeout(()=>chk.classList.remove("cp"),280);}
  const img=el.querySelector("img");
  if(img)img.style.filter=isO?"":"grayscale(100%) brightness(0.42)";
  if(curView==="list"){
    const sdot=el.querySelector(".sdot");
    if(sdot){sdot.className="sdot "+(isO?"o":"m");}
    const slbl=el.querySelector(".slabel");
    if(slbl)slbl.textContent=isO?"Owned":"Missing";
  }
  if(showMode==="owned"&&!isO)el.style.display="none";
  else if(showMode==="missing"&&isO)el.style.display="none";
  else el.style.display="";
  // update section count
  updateSectionCount(n);
}

function updateSectionCount(n){
  const sec=SECTIONS.find(s=>n>=s.from&&n<=s.to);
  if(!sec)return;
  const el=document.getElementById("sc-"+sec.from);
  if(!el)return;
  const cards=CARDS.filter(c=>c.n>=sec.from&&c.n<=sec.to);
  el.textContent=cards.filter(c=>owned.has(c.n)).length+"/"+cards.length;
}

function updateProgress(){
  const count=owned.size, pct=Math.round(count/TOTAL*100);
  document.getElementById("po").textContent=count;
  document.getElementById("pm").textContent=TOTAL-count;
  document.getElementById("pt").textContent=TOTAL;
  document.getElementById("pf").style.width=pct+"%";
  document.getElementById("ppct").textContent=pct+"%";
}

function imgUrl(n){return`https://assets.tcgdex.net/ja/sv2a/${n}/high.webp`;}

function tileSrc(c,isO,uid){
  const url=imgUrl(c.n);
  return`<div class="cimg">
    <div class="sph" id="s${uid}"></div>
    <div class="phi" id="p${uid}"><div class="mb"></div><span>···</span></div>
    <img src="${url}" alt="${c.name}" loading="lazy"
      onload="this.style.display='block';document.getElementById('s${uid}').classList.add('done');document.getElementById('p${uid}').style.display='none';${isO?'':'this.style.filter=\'grayscale(100%) brightness(0.42)\';'}"
      onerror="document.getElementById('s${uid}').classList.add('done');document.getElementById('p${uid}').querySelector('span').textContent='n/a';"/>
  </div>`;
}

function cardGrid(c){
  const isO=owned.has(c.n), sc=isO?"owned":"missing", uid="g"+c.n;
  const numStr=String(c.n).padStart(3,"0")+"/165";
  return`<div class="ctile ${sc}" id="c${c.n}" onclick="toggle(${c.n})">
    ${tileSrc(c,isO,uid)}
    <div class="ochk">${isO?"✓":""}</div>
    <div class="hover-hint"><span>${isO?"unmark":"mark owned"}</span></div>
    <div class="cinfo">
      <div class="cnum">${numStr}</div>
      <div class="cname">${c.name}</div>
      <span class="cr r-${c.r}">${c.r}</span>
    </div>
  </div>`;
}

function cardList(c){
  const isO=owned.has(c.n), sc=isO?"owned":"missing", uid="l"+c.n;
  const numStr=String(c.n).padStart(3,"0")+"/165";
  return`<div class="lrow ${sc}" id="c${c.n}" onclick="toggle(${c.n})">
    <div class="lthumb">
      <div class="sph" id="s${uid}"></div>
      <img src="${imgUrl(c.n)}" alt="${c.name}" loading="lazy"
        onload="this.style.display='block';document.getElementById('s${uid}').classList.add('done');${isO?'':'this.style.filter=\'grayscale(100%) brightness(0.45)\';'}"
        onerror="document.getElementById('s${uid}').classList.add('done')"/>
    </div>
    <div class="linfo">
      <div class="lname">${c.name}</div>
      <div class="lmeta"><span class="lnum">${numStr}</span><span class="cr r-${c.r}">${c.r}</span></div>
    </div>
    <div class="lstatus">
      <div class="sdot ${isO?"o":"m"}"></div>
      <span class="slabel">${isO?"Owned":"Missing"}</span>
    </div>
  </div>`;
}

function applyFilters(){
  const q=(document.getElementById("search").value||"").toLowerCase().trim();
  CARDS.forEach(c=>{
    const el=document.getElementById("c"+c.n);
    if(!el)return;
    const mR=activeRarity==="ALL"||c.r===activeRarity;
    const mQ=!q||c.name.toLowerCase().includes(q)||String(c.n).includes(q);
    const mS=showMode==="all"||(showMode==="owned"&&owned.has(c.n))||(showMode==="missing"&&!owned.has(c.n));
    el.style.display=(mR&&mQ&&mS)?"":"none";
  });
  document.querySelectorAll(".sec-block").forEach(s=>{
    const vis=[...s.querySelectorAll(".ctile,.lrow")].some(e=>e.style.display!=="none");
    s.style.display=vis?"":"none";
  });
}

function setRarity(btn){
  document.querySelectorAll(".pill").forEach(p=>p.classList.remove("on"));
  btn.classList.add("on"); activeRarity=btn.dataset.r; applyFilters();
}

const SHOW_MODES=["all","owned","missing"];
const SHOW_LABELS={all:"Show: All",owned:"Show: Owned",missing:"Show: Missing"};
const SHOW_CLS={all:"s-all",owned:"s-owned",missing:"s-missing"};
function cycleShow(){
  showMode=SHOW_MODES[(SHOW_MODES.indexOf(showMode)+1)%3];
  const b=document.getElementById("showbtn");
  b.textContent=SHOW_LABELS[showMode]; b.className="show-btn "+SHOW_CLS[showMode];
  applyFilters();
}

function setView(v){
  curView=v;
  document.getElementById("vg").classList.toggle("on",v==="grid");
  document.getElementById("vl").classList.toggle("on",v==="list");
  render();
}

function confirmReset(){
  if(confirm("Reset all owned marks?")){owned.clear();save();render();updateProgress();}
}

function render(){
  const isGrid=curView==="grid";
  let html="";
  SECTIONS.forEach(sec=>{
    const cards=CARDS.filter(c=>c.n>=sec.from&&c.n<=sec.to);
    const oc=cards.filter(c=>owned.has(c.n)).length;
    const wide=["AR","SAR","SR","UR"].includes(cards[0]?.r);
    html+=`<div class="sec-block">
      <div class="sec-div">
        <h2>${sec.label}</h2>
        <div class="sdivl"></div>
        <div class="sec-count" id="sc-${sec.from}">${oc}/${cards.length}</div>
      </div>
      <div class="${isGrid?"cgrid"+(wide?" wide":""):"clist"}">
        ${cards.map(c=>isGrid?cardGrid(c):cardList(c)).join("")}
      </div>
    </div>`;
  });
  document.getElementById("out").innerHTML=html;
  applyFilters();
}

load(); render(); updateProgress();
</script>
