<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pokémon Card 151 · SV2a Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0e13;--surf:#12151f;--card:#191d29;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e4e1d8;--muted:#565c72;--faint:#252a3a;
  --red:#ff4b69;--yellow:#ffd84d;--blue:#4dbfff;
  --green:#3deba0;--purple:#b87cff;
  --font:'Outfit',sans-serif;--mono:'Space Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 40% at 10% 0%,rgba(77,191,255,0.05) 0%,transparent 60%),
             radial-gradient(ellipse 50% 50% at 90% 100%,rgba(184,124,255,0.06) 0%,transparent 60%)}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,0.012) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,0.012) 1px,transparent 1px);
  background-size:48px 48px}
header{position:sticky;top:0;z-index:50;background:rgba(12,14,19,0.92);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);padding:0.85rem 2rem;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:0.65rem;flex-shrink:0}
.pokeball{width:30px;height:30px;border-radius:50%;
  background:conic-gradient(var(--red) 0deg 180deg,#ccc8be 180deg 360deg);
  display:flex;align-items:center;justify-content:center;border:2px solid var(--border2);position:relative;flex-shrink:0}
.pokeball::before{content:'';position:absolute;left:0;right:0;top:50%;height:2px;background:var(--border2);transform:translateY(-50%)}
.pokeball::after{content:'';width:7px;height:7px;border-radius:50%;background:var(--bg);border:2px solid var(--border2);position:absolute}
.logo-text{font-size:0.95rem;font-weight:800;letter-spacing:-0.02em}
.logo-text span{color:var(--red)}
.logo-sub{font-family:var(--mono);font-size:0.5rem;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;display:block;margin-top:1px}
.hcontrols{display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap}
.sw{position:relative}
.sw input{background:var(--card);border:1px solid var(--border);border-radius:7px;
  padding:0.4rem 0.7rem 0.4rem 1.9rem;color:var(--text);font-family:var(--font);font-size:0.8rem;
  width:180px;outline:none;transition:border-color 0.2s}
.sw input:focus{border-color:var(--border2)}
.sw input::placeholder{color:var(--muted)}
.si{position:absolute;left:0.55rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:11px;pointer-events:none}
.pills{display:flex;gap:3px;flex-wrap:wrap}
.pill{font-family:var(--mono);font-size:0.56rem;letter-spacing:0.08em;text-transform:uppercase;
  border:1px solid var(--border);border-radius:20px;padding:3px 8px;
  background:none;color:var(--muted);cursor:pointer;transition:all 0.15s}
.pill.on{background:var(--faint);border-color:var(--border2);color:var(--text)}
.pill:hover:not(.on){border-color:var(--border2);color:var(--text)}
.sbtn{font-family:var(--mono);font-size:0.56rem;letter-spacing:0.08em;text-transform:uppercase;
  border:1px solid var(--border);border-radius:20px;padding:3px 9px;
  background:none;cursor:pointer;white-space:nowrap;transition:all 0.15s}
.sbtn.s-all{color:var(--muted)}
.sbtn.s-owned{color:var(--green);border-color:rgba(61,235,160,0.3);background:rgba(61,235,160,0.06)}
.sbtn.s-missing{color:var(--red);border-color:rgba(255,75,105,0.3);background:rgba(255,75,105,0.06)}
.vrow{display:flex;gap:3px}
.vbtn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--muted);cursor:pointer;padding:4px 7px;font-size:12px;transition:all 0.15s}
.vbtn.on{color:var(--text);background:var(--faint);border-color:var(--border2)}
.rbtn{font-family:var(--mono);font-size:0.56rem;letter-spacing:0.08em;text-transform:uppercase;
  background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;padding:3px 8px;transition:all 0.15s}
.rbtn:hover{color:var(--red);border-color:rgba(255,75,105,0.4)}
#load-banner{position:relative;z-index:5;background:rgba(77,191,255,0.07);border-bottom:1px solid rgba(77,191,255,0.15);
  padding:0.55rem 2rem;display:flex;align-items:center;gap:0.75rem}
#load-banner.done{display:none}
.spin{width:13px;height:13px;border:2px solid rgba(77,191,255,0.2);border-top-color:var(--blue);
  border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
#load-msg{font-family:var(--mono);font-size:0.6rem;color:var(--blue);letter-spacing:0.06em}
#load-prog{font-family:var(--mono);font-size:0.6rem;color:var(--muted);margin-left:auto}
.progress-strip{position:relative;z-index:5;background:var(--surf);border-bottom:1px solid var(--border);
  padding:0.8rem 2rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
.pstats{display:flex;gap:1.5rem;flex-wrap:wrap}
.ps{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.08em;color:var(--muted)}
.ps b{color:var(--text);font-weight:700}
.ps.g b{color:var(--green)}.ps.r b{color:var(--red)}
.ptk{flex:1;min-width:160px;height:5px;background:var(--faint);border-radius:3px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--green),#7af5c8);border-radius:3px;transition:width 0.4s}
.ppct{font-family:var(--mono);font-size:0.66rem;font-weight:700;color:var(--green);min-width:34px;text-align:right}
.sec-div{position:relative;z-index:5;padding:1rem 2rem 0.4rem;display:flex;align-items:center;gap:1rem}
.sec-div h2{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.sdivl{flex:1;height:1px;background:var(--border)}
.sec-count{font-family:var(--mono);font-size:0.54rem;color:var(--muted);background:var(--faint);border:1px solid var(--border);border-radius:10px;padding:2px 7px;white-space:nowrap}
.main{position:relative;z-index:5;padding:0 2rem 3rem}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:9px}
.cgrid.wide{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
.ctile{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;
  border:2px solid transparent;transition:transform 0.18s,border-color 0.18s,box-shadow 0.18s;
  background:var(--card);user-select:none}
.ctile:hover{transform:translateY(-4px)}
.ctile.owned{border-color:rgba(61,235,160,0.5);box-shadow:0 0 14px rgba(61,235,160,0.18)}
.ctile.missing{border-color:rgba(255,255,255,0.05)}
.ctile.missing .cimg img{filter:grayscale(100%) brightness(0.4)}
.cimg{aspect-ratio:2.5/3.5;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;background:var(--faint)}
.cimg img{width:100%;height:100%;object-fit:cover;display:none;transition:transform 0.25s}
.ctile:hover .cimg img{transform:scale(1.06)}
.skel{position:absolute;inset:0;background:linear-gradient(90deg,var(--faint) 25%,#323648 50%,var(--faint) 75%);
  background-size:400% 100%;animation:shimmer 1.5s infinite}
.skel.done{display:none}
.phold{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;opacity:0.25}
.phold .mb{width:28px;height:28px;border-radius:50%;background:conic-gradient(var(--red) 0deg 180deg,#555 180deg 360deg);
  position:relative;display:flex;align-items:center;justify-content:center}
.phold .mb::after{content:'';width:8px;height:8px;border-radius:50%;background:var(--faint);position:absolute}
.phold span{font-family:var(--mono);font-size:0.48rem;color:var(--muted)}
.phold.done{display:none}
.ochk{position:absolute;top:5px;right:5px;z-index:3;width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;transition:all 0.2s}
.ctile.owned .ochk{background:var(--green);color:#072015}
.ctile.missing .ochk{background:rgba(255,255,255,0.07);color:transparent;border:1px solid var(--border)}
.hhint{position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;transition:opacity 0.18s}
.ctile:hover .hhint{opacity:1}
.hhint span{font-family:var(--mono);font-size:0.56rem;letter-spacing:0.08em;text-transform:uppercase;
  padding:4px 9px;border-radius:5px;backdrop-filter:blur(6px)}
.ctile.owned .hhint span{background:rgba(61,235,160,0.12);border:1px solid rgba(61,235,160,0.3);color:var(--green)}
.ctile.missing .hhint span{background:rgba(255,75,105,0.1);border:1px solid rgba(255,75,105,0.25);color:var(--red)}
.cinfo{padding:5px 7px 7px;background:var(--card)}
.cnum{font-family:var(--mono);font-size:0.49rem;color:var(--muted);margin-bottom:1px}
.cname{font-size:0.72rem;font-weight:600;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cr{display:inline-block;margin-top:3px;font-family:var(--mono);font-size:0.44rem;letter-spacing:0.1em;text-transform:uppercase;font-weight:700;padding:1px 5px;border-radius:10px}
.r-C  {background:rgba(86,92,114,0.18);color:#8b90a8;border:1px solid rgba(255,255,255,0.07)}
.r-R  {background:rgba(77,191,255,0.12);color:var(--blue);border:1px solid rgba(77,191,255,0.2)}
.r-RR {background:rgba(255,78,106,0.12);color:var(--red);border:1px solid rgba(255,78,106,0.22)}
.r-AR {background:rgba(77,191,255,0.12);color:var(--blue);border:1px solid rgba(77,191,255,0.2)}
.r-SR {background:rgba(255,216,77,0.12);color:var(--yellow);border:1px solid rgba(255,216,77,0.22)}
.r-SAR{background:rgba(184,124,255,0.15);color:var(--purple);border:1px solid rgba(184,124,255,0.28)}
.r-UR {background:rgba(61,235,160,0.12);color:var(--green);border:1px solid rgba(61,235,160,0.25)}
.clist{}
.lrow{display:flex;align-items:center;gap:10px;padding:7px 8px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;
  border-radius:6px;margin:0 -8px}
.lrow:hover{background:rgba(255,255,255,0.025)}
.lthumb{width:34px;height:47px;border-radius:4px;overflow:hidden;flex-shrink:0;background:var(--faint);position:relative}
.lthumb img{width:100%;height:100%;object-fit:cover;display:none}
.lrow.missing .lthumb img{filter:grayscale(100%) brightness(0.45)}
.linfo{flex:1;min-width:0}
.lname{font-size:0.85rem;font-weight:600}
.lmeta{display:flex;align-items:center;gap:5px;margin-top:2px}
.lnum{font-family:var(--mono);font-size:0.58rem;color:var(--muted)}
.lstatus{margin-left:auto;display:flex;align-items:center;gap:5px;flex-shrink:0}
.sdot{width:7px;height:7px;border-radius:50%}
.sdot.o{background:var(--green)}.sdot.m{background:var(--faint);border:1px solid var(--muted)}
.slabel{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.06em;text-transform:uppercase}
.lrow.owned .slabel{color:var(--green)}
.lrow.missing .slabel{color:var(--muted)}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pop{0%{transform:scale(0.5)}60%{transform:scale(1.35)}100%{transform:scale(1)}}
.pop{animation:pop 0.22s ease forwards}

/* ── PRICE BUTTON ON TILE ── */
.price-btn{
  position:absolute;bottom:42px;left:0;right:0;z-index:4;
  display:flex;justify-content:center;
  opacity:0;transition:opacity 0.18s;pointer-events:none;
}
.ctile:hover .price-btn{opacity:1;pointer-events:all}
.price-btn button{
  font-family:var(--mono);font-size:0.5rem;letter-spacing:0.1em;text-transform:uppercase;
  background:rgba(13,14,19,0.82);border:1px solid var(--border2);
  color:var(--yellow);border-radius:5px;padding:3px 10px;cursor:pointer;
  backdrop-filter:blur(8px);transition:background 0.15s;white-space:nowrap;
}
.price-btn button:hover{background:rgba(255,216,77,0.15)}

/* ── PRICE MODAL BACKDROP ── */
#pm-backdrop{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.78);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.22s;
}
#pm-backdrop.open{opacity:1;pointer-events:all}

/* ── PRICE MODAL ── */
#pm-modal{
  background:var(--card);border:1px solid var(--border2);border-radius:18px;
  width:90%;max-width:680px;max-height:88vh;overflow:hidden;
  display:flex;flex-direction:column;
  transform:translateY(20px) scale(0.97);transition:transform 0.22s;
}
#pm-backdrop.open #pm-modal{transform:translateY(0) scale(1)}

.pm-head{
  display:flex;align-items:center;gap:1rem;padding:1.25rem 1.5rem;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.pm-card-img{
  width:58px;height:80px;border-radius:8px;overflow:hidden;
  background:var(--faint);flex-shrink:0;
}
.pm-card-img img{width:100%;height:100%;object-fit:cover;display:none}
.pm-card-img .skel{position:absolute;inset:0}
.pm-title-wrap{flex:1;min-width:0}
.pm-title{font-size:1.1rem;font-weight:800;letter-spacing:-0.02em;line-height:1.2}
.pm-sub{font-family:var(--mono);font-size:0.58rem;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:8px}
.pm-close{
  background:none;border:1px solid var(--border);border-radius:6px;
  color:var(--muted);cursor:pointer;width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;font-size:13px;
  transition:color 0.15s,border-color 0.15s;flex-shrink:0;
}
.pm-close:hover{color:var(--text);border-color:var(--border2)}

.pm-body{padding:1.25rem 1.5rem;overflow-y:auto;flex:1}

/* loading state */
.pm-loading{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1rem;padding:2.5rem 1rem;
}
.pm-loading .big-spin{
  width:32px;height:32px;border:3px solid var(--faint);border-top-color:var(--yellow);
  border-radius:50%;animation:spin 0.8s linear infinite;
}
.pm-loading p{font-family:var(--mono);font-size:0.65rem;color:var(--muted);text-align:center;line-height:1.6}

/* price summary cards */
.pm-prices{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.pm-pcard{background:var(--faint);border-radius:10px;padding:0.85rem 1rem}
.pm-pcard-label{font-family:var(--mono);font-size:0.52rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.pm-pcard-val{font-size:1.3rem;font-weight:800;letter-spacing:-0.03em}
.pm-pcard-val.yen{color:var(--yellow)}
.pm-pcard-val.usd{color:var(--green)}
.pm-pcard-val.eur{color:var(--blue)}
.pm-pcard-sub{font-family:var(--mono);font-size:0.54rem;color:var(--muted);margin-top:2px}

/* sales list */
.pm-sales-title{font-family:var(--mono);font-size:0.56rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:0.75rem}
.pm-sale-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;border-bottom:1px solid var(--border);font-size:0.82rem;
}
.pm-sale-row:last-child{border-bottom:none}
.pm-sale-platform{font-family:var(--mono);font-size:0.6rem;color:var(--muted)}
.pm-sale-desc{flex:1;padding:0 0.75rem;font-size:0.78rem;color:var(--text);line-height:1.3}
.pm-sale-price{font-family:var(--mono);font-size:0.78rem;font-weight:700;color:var(--yellow);white-space:nowrap}
.pm-sale-date{font-family:var(--mono);font-size:0.54rem;color:var(--muted);margin-left:8px;white-space:nowrap}

/* insight block */
.pm-insight{
  background:rgba(255,216,77,0.05);border:1px solid rgba(255,216,77,0.15);
  border-radius:8px;padding:0.85rem 1rem;margin-top:1rem;
  font-size:0.8rem;line-height:1.65;color:var(--text);
}
.pm-insight strong{color:var(--yellow);font-weight:600}

/* error state */
.pm-error{text-align:center;padding:2rem 1rem;font-family:var(--mono);font-size:0.68rem;color:var(--muted)}

/* search links */
.pm-links{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap}
.pm-link{
  font-family:var(--mono);font-size:0.58rem;letter-spacing:0.06em;text-transform:uppercase;
  border:1px solid var(--border2);border-radius:6px;padding:5px 12px;
  color:var(--muted);text-decoration:none;transition:color 0.15s,border-color 0.15s;
}
.pm-link:hover{color:var(--text);border-color:var(--text)}

/* ── CURRENCY TOGGLE ── */
.curr-toggle{display:flex;gap:0;border:1px solid var(--border);border-radius:7px;overflow:hidden}
.curr-btn{
  font-family:var(--mono);font-size:0.56rem;letter-spacing:0.06em;text-transform:uppercase;
  background:none;border:none;border-right:1px solid var(--border);
  color:var(--muted);cursor:pointer;padding:4px 10px;transition:all 0.15s;
}
.curr-btn:last-child{border-right:none}
.curr-btn.on{background:var(--faint);color:var(--yellow)}
.curr-btn:hover:not(.on){color:var(--text);background:rgba(255,255,255,0.03)}

/* price display chip used in modal header */
.pm-currency-note{
  font-family:var(--mono);font-size:0.52rem;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--muted);background:var(--faint);border:1px solid var(--border);
  border-radius:5px;padding:2px 7px;margin-left:auto;
}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="pokeball"></div>
    <div>
      <div class="logo-text">Pokémon Card <span>151</span></div>
      <span class="logo-sub">SV2a · Japanese · Complete Checklist</span>
    </div>
  </div>
  <div class="hcontrols">
    <div class="sw">
      <span class="si">⌕</span>
      <input id="search" placeholder="Search cards…" oninput="applyFilters()"/>
    </div>
    <div class="pills" id="rpills">
      <button class="pill on" data-r="ALL" onclick="setRarity(this)">All</button>
      <button class="pill" data-r="C"   onclick="setRarity(this)">C</button>
      <button class="pill" data-r="R"   onclick="setRarity(this)">R</button>
      <button class="pill" data-r="RR"  onclick="setRarity(this)">RR</button>
      <button class="pill" data-r="AR"  onclick="setRarity(this)">AR</button>
      <button class="pill" data-r="SR"  onclick="setRarity(this)">SR</button>
      <button class="pill" data-r="SAR" onclick="setRarity(this)">SAR</button>
      <button class="pill" data-r="UR"  onclick="setRarity(this)">UR</button>
    </div>
    <button class="sbtn s-all" id="showbtn" onclick="cycleShow()">Show: All</button>
    <div class="vrow">
      <button class="vbtn on" id="vg" onclick="setView('grid')" title="Grid">⊞</button>
      <button class="vbtn"    id="vl" onclick="setView('list')" title="List">≡</button>
    </div>
    <div class="curr-toggle" title="Display currency">
      <button class="curr-btn on" data-c="JPY" onclick="setCurrency(this)">¥ JPY</button>
      <button class="curr-btn"    data-c="USD" onclick="setCurrency(this)">$ USD</button>
      <button class="curr-btn"    data-c="SGD" onclick="setCurrency(this)">S$ SGD</button>
    </div>
    <button class="rbtn" onclick="confirmReset()">Reset</button>
  </div>
</header>

<!-- PRICE MODAL -->
<div id="pm-backdrop" onclick="pmCloseBg(event)">
  <div id="pm-modal">
    <div class="pm-head">
      <div class="pm-card-img" id="pm-img-wrap" style="position:relative">
        <div class="skel" id="pm-img-skel" style="border-radius:8px;position:absolute;inset:0"></div>
        <img id="pm-img" src="" alt=""
          onload="this.style.display='block';document.getElementById('pm-img-skel').style.display='none'"
          onerror="document.getElementById('pm-img-skel').style.display='none'"/>
      </div>
      <div class="pm-title-wrap">
        <div class="pm-title" id="pm-title"></div>
        <div class="pm-sub">
          <span id="pm-num"></span>
          <span id="pm-rarity-badge"></span>
        </div>

function toggle(n){
  owned.has(n)?owned.delete(n):owned.add(n);
  save();updateProgress();
  const el=document.getElementById('c'+n);if(!el)return;
  const isO=owned.has(n);
  el.classList.toggle('owned',isO);el.classList.toggle('missing',!isO);
  const chk=el.querySelector('.ochk');
  if(chk){chk.textContent=isO?'✓':'';chk.classList.add('pop');setTimeout(()=>chk.classList.remove('pop'),280);}
  const img=el.querySelector('img');
  if(img)img.style.filter=isO?'':'grayscale(100%) brightness(0.4)';
  if(curView==='list'){
    const d=el.querySelector('.sdot');if(d)d.className='sdot '+(isO?'o':'m');
    const l=el.querySelector('.slabel');if(l)l.textContent=isO?'Owned':'Missing';
  }
  if(showMode==='owned'&&!isO)el.style.display='none';
  else if(showMode==='missing'&&isO)el.style.display='none';
  else el.style.display='';
  const sec=SECTIONS.find(s=>n>=s.from&&n<=s.to);
  if(sec){const el2=document.getElementById('sc-'+sec.from);if(el2){const cs=CARDS.filter(c=>c.n>=sec.from&&c.n<=sec.to);el2.textContent=cs.filter(c=>owned.has(c.n)).length+'/'+cs.length;}}
}

function applyFilters(){
  const q=(document.getElementById('search').value||'').toLowerCase().trim();
  CARDS.forEach(c=>{
    const el=document.getElementById('c'+c.n);if(!el)return;
    const mR=activeRarity==='ALL'||c.r===activeRarity;
    const mQ=!q||c.name.toLowerCase().includes(q)||String(c.n).includes(q);
    const mS=showMode==='all'||(showMode==='owned'&&owned.has(c.n))||(showMode==='missing'&&!owned.has(c.n));
    el.style.display=(mR&&mQ&&mS)?'':'none';
  });
  document.querySelectorAll('.sec-block').forEach(s=>{
    s.style.display=[...s.querySelectorAll('.ctile,.lrow')].some(e=>e.style.display!=='none')?'':'none';
  });
}

const SHOW_MODES=['all','owned','missing'],SHOW_LABELS={all:'Show: All',owned:'Show: Owned',missing:'Show: Missing'},SHOW_CLS={all:'s-all',owned:'s-owned',missing:'s-missing'};
function cycleShow(){showMode=SHOW_MODES[(SHOW_MODES.indexOf(showMode)+1)%3];const b=document.getElementById('showbtn');b.textContent=SHOW_LABELS[showMode];b.className='sbtn '+SHOW_CLS[showMode];applyFilters();}

function render(){
  const isGrid=curView==='grid';
  let html='';
  SECTIONS.forEach(sec=>{
    const cards=CARDS.filter(c=>c.n>=sec.from&&c.n<=sec.to);
    const oc=cards.filter(c=>owned.has(c.n)).length;
    const wide=cards[0]&&!['C','R','RR'].includes(cards[0].r);
    html+='<div class="sec-block"><div class="sec-div"><h2>'+sec.label+'</h2>'
      +'<div class="sdivl"></div><div class="sec-count" id="sc-'+sec.from+'">'+oc+'/'+cards.length+'</div></div>'
      +'<div class="'+(isGrid?'cgrid'+(wide?' wide':''):'clist')+'">'
      +cards.map(c=>isGrid?cardGrid(c):cardList(c)).join('')
      +'</div></div>';
  });
  document.getElementById('out').innerHTML=html;
  applyFilters();
}

  pmImg.style.display = 'none';
  pmSkel.style.display = 'block';
  if (url) { pmImg.src = url; pmImg.alt = card.name; }

  // Show backdrop
  window._currentPriceCard = n;
  document.getElementById('pm-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Check cache
  if (PM_CACHE[n]) {
    renderPriceData(PM_CACHE[n]);
    return;
  }

  // Show loading
  document.getElementById('pm-body').innerHTML =
    '<div class="pm-loading"><div class="big-spin"></div><p>Searching eBay sold listings,<br>Mercari Japan &amp; CardMarket&hellip;</p></div>';

  fetchPriceData(card);
}

function pmClose() {
  window._currentPriceCard = null;
  document.getElementById('pm-backdrop').classList.remove('open');
  document.body.style.overflow = '';
}
function pmCloseBg(e) {
  if (e.target === document.getElementById('pm-backdrop')) pmClose();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') pmClose(); });

async function fetchPriceData(card) {
  const query = card.name + ' ' + String(card.n).padStart(3,'0') + '/165 SV2a Japanese pokemon card';
  const ebaySearchUrl = 'https://www.ebay.com/sch/i.html?_nkw=' + encodeURIComponent(card.name + ' sv2a pokemon card 151 japanese') + '&LH_Sold=1&LH_Complete=1';
  const mercariUrl = 'https://jp.mercari.com/search?keyword=' + encodeURIComponent('ポケモンカード 151 ' + card.name + ' sv2a') + '&status=sold_out';
  const cardmarketUrl = 'https://www.cardmarket.com/en/Pokemon/Products/Search?searchString=' + encodeURIComponent(card.name + ' 151');

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        system: `You are a Pokémon card price expert. The user wants the latest sold/sale prices for a specific Japanese SV2a Pokémon Card 151 card. 
Search for RECENT SOLD prices (last 30-90 days) on eBay, Mercari Japan, and CardMarket.
Search in both JPY (Japanese yen) and USD.

{
  "card": "card name",
  "prices": {
    "ebay_usd_avg": number or null,
    "ebay_usd_low": number or null,
    "ebay_usd_high": number or null,
    "mercari_jpy_avg": number or null,
    "cardmarket_eur_avg": number or null
  },
  "recent_sales": [
    {"platform": "eBay/Mercari/CardMarket", "description": "brief description", "price": "¥XXXX or $XX.XX", "date": "approx date"}
  ],
  "insight": "2-3 sentence market insight: trend, whether now is good time to buy/sell, notable observations",
  "data_freshness": "note about how recent the data is"
}
recent_sales should have 3-6 entries. If you cannot find real data for a field, use null. Do not invent prices.`,
        messages: [{
          role: 'user',
          content: 'Find the latest sold prices for: ' + card.name + ' from Pokémon Card 151 (SV2a Japanese set), card number ' + String(card.n).padStart(3,'0') + '/165, rarity ' + card.r + '. Search eBay completed listings, Mercari Japan, and CardMarket for recent sold prices.'
        }]
      })
    });

    if (!response.ok) throw new Error('API ' + response.status);
    const data = await response.json();

    // Extract text from response (may contain tool_use blocks too)
    const textBlocks = (data.content || []).filter(b => b.type === 'text');
    const rawText = textBlocks.map(b => b.text).join('');

    // Parse JSON from the response
    const jsonMatch = rawText.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('No JSON in response');
    const priceData = JSON.parse(jsonMatch[0]);
    priceData._links = { ebay: ebaySearchUrl, mercari: mercariUrl, cardmarket: cardmarketUrl };
    PM_CACHE[card.n] = priceData;
    renderPriceData(priceData);

  } catch(err) {
    console.error('Price fetch error:', err);
    renderPriceError(card, ebaySearchUrl, mercariUrl, cardmarketUrl);
  }
}

/* ── CURRENCY STATE ── */
let activeCurrency = 'JPY'; // default
// Approximate exchange rates (updated at build time; modal will note this)
// Base: USD. These are rough reference rates.
const FX = { USD: 1, JPY: 149.5, SGD: 1.34, EUR: 0.93 };

function setCurrency(btn) {
  document.querySelectorAll('.curr-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  activeCurrency = btn.dataset.c;
  // Re-render any open price modal with new currency
  const openCard = window._currentPriceCard;
  if (openCard && PM_CACHE[openCard]) {
    renderPriceData(PM_CACHE[openCard]);
  }
}

function convertPrice(usdValue, targetCurrency) {
  if (usdValue == null) return null;
  return usdValue * FX[targetCurrency];
}

function fmtCurrency(value, currency) {
  if (value == null) return '—';
  const rounded = Math.round(value * 100) / 100;
  const symbols = { USD: '$', JPY: '¥', SGD: 'S$', EUR: '€' };
  const sym = symbols[currency] || currency + ' ';
  if (currency === 'JPY') return sym + Math.round(value).toLocaleString();
  return sym + rounded.toFixed(2);
}

// Convert a JPY value to target currency via USD
function fromJPY(jpyValue, targetCurrency) {
  if (jpyValue == null) return null;
  const usd = jpyValue / FX['JPY'];
  return convertPrice(usd, targetCurrency);
}

// Convert EUR to target currency via USD
function fromEUR(eurValue, targetCurrency) {
  if (eurValue == null) return null;
  const usd = eurValue / FX['EUR'];
  return convertPrice(usd, targetCurrency);
}

function renderPriceData(d) {
  const p = d.prices || {};
  const sales = d.recent_sales || [];
  const cur = activeCurrency;
  const curLabel = { USD: 'USD', JPY: 'JPY', SGD: 'SGD' }[cur] || cur;
  const curSym = { USD: '$', JPY: '¥', SGD: 'S$' }[cur] || cur;

  // Convert all source prices to the selected currency
  const ebayAvg  = convertPrice(p.ebay_usd_avg, cur);
  const ebayLow  = convertPrice(p.ebay_usd_low, cur);
  const ebayHigh = convertPrice(p.ebay_usd_high, cur);
  const mercariC = fromJPY(p.mercari_jpy_avg, cur);
  const cardmktC = fromEUR(p.cardmarket_eur_avg, cur);

  const fmt = v => fmtCurrency(v, cur);

  // Color class for the main value
  const valCls = cur === 'JPY' ? 'yen' : cur === 'USD' ? 'usd' : 'usd';

  let html = '';

  // Currency note
  html += '<div style="display:flex;align-items:center;margin-bottom:1rem">'
    + '<span style="font-family:var(--mono);font-size:0.56rem;color:var(--muted)">All prices shown in <strong style="color:var(--text)">' + curLabel + '</strong>'
    + (cur !== 'USD' && cur !== 'JPY' && cur !== 'EUR' ? '' : '')
    + ' · Converted at approximate rates</span>'
    + '</div>';

  // Price cards
  html += '<div class="pm-prices">';
  html += '<div class="pm-pcard"><div class="pm-pcard-label">eBay avg (' + curLabel + ')</div>'
    + '<div class="pm-pcard-val ' + valCls + '">' + fmt(ebayAvg) + '</div>'
    + '<div class="pm-pcard-sub">Low: ' + fmt(ebayLow) + ' · High: ' + fmt(ebayHigh) + '</div></div>';
  html += '<div class="pm-pcard"><div class="pm-pcard-label">Mercari JP (' + curLabel + ')</div>'
    + '<div class="pm-pcard-val ' + valCls + '">' + fmt(mercariC) + '</div>'
    + '<div class="pm-pcard-sub">Recent sold avg</div></div>';
  html += '<div class="pm-pcard"><div class="pm-pcard-label">CardMarket (' + curLabel + ')</div>'
    + '<div class="pm-pcard-val ' + valCls + '">' + fmt(cardmktC) + '</div>'
    + '<div class="pm-pcard-sub">Market trend avg</div></div>';
  html += '</div>';

  // Recent sales — convert prices where recognisable
  if (sales.length) {
    html += '<div class="pm-sales-title">Recent sold listings</div>';
    sales.forEach(s => {
      // Try to convert price string to selected currency
      let displayPrice = s.price || '';
      if (displayPrice) {
        const jpyMatch = displayPrice.match(/[¥￥]([\d,]+)/);
        const usdMatch = displayPrice.match(/\$([\d,.]+)/);
        const eurMatch = displayPrice.match(/€([\d,.]+)/);
        if (jpyMatch) {
          const jpy = parseFloat(jpyMatch[1].replace(/,/g, ''));
          displayPrice = fmtCurrency(fromJPY(jpy, cur), cur);
        } else if (usdMatch) {
          const usd = parseFloat(usdMatch[1].replace(/,/g, ''));
          displayPrice = fmtCurrency(convertPrice(usd, cur), cur);
        } else if (eurMatch) {
          const eur = parseFloat(eurMatch[1].replace(/,/g, ''));
          displayPrice = fmtCurrency(fromEUR(eur, cur), cur);
        }
      }
      html += '<div class="pm-sale-row">'
        + '<span class="pm-sale-platform">' + (s.platform||'') + '</span>'
        + '<span class="pm-sale-desc">' + (s.description||'') + '</span>'
        + '<span class="pm-sale-price">' + displayPrice + '</span>'
        + '<span class="pm-sale-date">' + (s.date||'') + '</span>'
        + '</div>';
    });
  }

  // Market insight
  if (d.insight) {
    html += '<div class="pm-insight">' + d.insight + '</div>';
  }

  // Freshness + FX disclaimer
  const fxNote = 'Rates used: 1 USD = ¥' + FX.JPY + ' · S$' + FX.SGD + ' · €' + FX.EUR + '. Approximate only.';
  html += '<div style="font-family:var(--mono);font-size:0.52rem;color:var(--muted);margin-top:0.75rem;line-height:1.7">';
  if (d.data_freshness) html += d.data_freshness + '<br>';
  html += fxNote + '</div>';

  // Search links
  const links = d._links || {};
  html += '<div class="pm-links">';
  if (links.ebay) html += '<a class="pm-link" href="' + links.ebay + '" target="_blank" rel="noopener">eBay sold ↗</a>';
  if (links.mercari) html += '<a class="pm-link" href="' + links.mercari + '" target="_blank" rel="noopener">Mercari JP ↗</a>';
  if (links.cardmarket) html += '<a class="pm-link" href="' + links.cardmarket + '" target="_blank" rel="noopener">CardMarket ↗</a>';
  html += '</div>';

  document.getElementById('pm-body').innerHTML = html;
}

function renderPriceError(card, ebay, mercari, cardmarket) {
  const name = card.name;
  document.getElementById('pm-body').innerHTML =
    '<div class="pm-error">Could not fetch live prices. Check directly on:</div>'
    + '<div class="pm-links" style="justify-content:center;margin-top:1rem">'
    + '<a class="pm-link" href="' + ebay + '" target="_blank" rel="noopener">eBay sold ↗</a>'
    + '<a class="pm-link" href="' + mercari + '" target="_blank" rel="noopener">Mercari JP ↗</a>'
    + '<a class="pm-link" href="' + cardmarket + '" target="_blank" rel="noopener">CardMarket ↗</a>'
    + '</div>';
}


load();render();updateProgress();fetchImages();
</script>
